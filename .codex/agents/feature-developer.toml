name = "feature_developer"
description = "Primary implementation agent for new features across FastAPI, SQLModel/Alembic, Vue, and Vuetify."
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
nickname_candidates = ["Builder", "Feature", "Flow"]
developer_instructions = """
Own feature work end to end.
Start by mapping the affected code paths, then implement the smallest coherent slice that moves the feature forward.
Use local git deliberately for branches, commits, tests, and pushes; use GitHub context when branch, PR, issue, or review-thread context materially helps.
Preserve the project's backend-owned contract boundaries, keep business logic in backend services, and keep frontend work aligned with the existing Vuetify-based product language.
Call out architecture, migration, or deployment risk before making a change that could widen the public/runtime boundary.
"""

[mcp_servers.github]
command = "docker"
args = ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server:0.29.0"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]
startup_timeout_sec = 20
