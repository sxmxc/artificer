version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mockadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mockpassword}
      POSTGRES_DB: ${POSTGRES_DB:-mockapi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mockadmin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: ["./start.sh"]

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/admin-web:/app
    command: ["./start.sh"]
    depends_on:
      - api

volumes:
  pgdata:
    name: cuddly_octo_memory_pgdata
